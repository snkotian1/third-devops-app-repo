# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

jobs:
  - job: job1
    dependsOn: job2
    steps:
    - script: echo Hello, world!----updated within job1
      displayName: 'Run first step in job1'

    - script: |
        echo Add other tasks to build, test, and deploy your project.
        echo This is step 2  in  job1
      displayName: 'Run second step which contains multiple lines in job1'

  - job: job2
    steps: 
      - script: echo this is a step in job2
        displayName: 'Run first step in job2'